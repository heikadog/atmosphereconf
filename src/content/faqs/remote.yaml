- id: remote-options
  curated: true
  question: Are there options for attending the conference remotely?
  answer: |
    Yes, you can read the [initial announcement on Remote / Hybrid participation](https://news.atmosphereconf.org/3mdm4s4psws2a).

    Go to the [Remote](/remote) page for the main dashboard for remote streaming & chat, plus forums and more. There is a $10USD suggested donation for remote attendees, and regardless of payment we ask that you register and accept the code of conduct.

- id: remote-workshops
  question: Will the workshops be available virtually or are there any virtual workshops?
  answer: |
    The workshops will primarily be designed as in person workshops, with presentations and support.

    We'll look at capturing video / streaming the ones that make sense, and as we confirm workshops we'll discuss with presenters how / if they are able to also include remote participants.
- id: remote-streaming
  question: How can I watch the video streaming?
  answer: |
    Video streaming is provided by [Streamplace](https://stream.place). You can access streams in a web browser, or through the Streamplace desktop or mobile apps. Login with your Atmosphere account, and you'll be able to chat on stream.

    Stream links will be available on the [remote page](/remote).
- id: remote-video-recording
  curated: true
  question: Will the videos be recorded?
  answer: |
    Yes, the videos will be recorded and made available after the conference for watching on demand.
- id: remote-chat
  question: What other online spaces are available?
  answer: |
    We have a [Roomy space at roomy.space/atmosphereconf.org](https://roomy.space/atmosphereconf.org). Login with your Atmosphere account to participate there.
